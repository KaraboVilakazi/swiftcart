version: "3.9"

# ─────────────────────────────────────────────────────────────
# SwiftCart — local development stack
#
# Services:
#   postgres  — primary database
#   redis     — caching layer
#   app       — Spring Boot application
#
# Usage:
#   docker compose up --build        # first run
#   docker compose up -d             # subsequent runs (detached)
#   docker compose down -v           # tear down including volumes
# ─────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: swiftcart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       swiftcart
      POSTGRES_USER:     swiftcart
      POSTGRES_PASSWORD: swiftcart
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftcart"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: swiftcart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swiftcart-app
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       swiftcart
      DB_USER:       swiftcart
      DB_PASSWORD:   swiftcart
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      JWT_SECRET:    ZmVlNjU4NGRhZjkyMWNhNTcxMmM5ZjJlNDM2M2YyZTBhYzJmNmViYzljMGJmMzRhZGM2NDE1NDMzYzVhMDdjOA==
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
