spring:
  # Testcontainers @ServiceConnection overrides datasource automatically
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  # Disable Redis for unit/integration tests — use simple in-memory cache
  cache:
    type: none

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: dGVzdFNlY3JldEtleUZvckp3dFRlc3RpbmdQdXJwb3Nlc09ubHkxMjM0NTY3OA==
    expiration-ms: 3600000
  inventory:
    max-retry-attempts: 3
    retry-delay-ms: 0

logging:
  level:
    com.swiftcart: WARN
    org.flywaydb: WARN
