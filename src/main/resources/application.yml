spring:
  application:
    name: swiftcart

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:swiftcart}
    username: ${DB_USER:swiftcart}
    password: ${DB_PASSWORD:swiftcart}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema — JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 300000        # 5 minutes default TTL

# JWT
app:
  jwt:
    secret: ${JWT_SECRET:ZmVlNjU4NGRhZjkyMWNhNTcxMmM5ZjJlNDM2M2YyZTBhYzJmNmViYzljMGJmMzRhZGM2NDE1NDMzYzVhMDdjOA==}
    expiration-ms: 86400000       # 24 hours

# Inventory retry
  inventory:
    max-retry-attempts: 3
    retry-delay-ms: 100

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.swiftcart: DEBUG
    org.springframework.security: WARN
